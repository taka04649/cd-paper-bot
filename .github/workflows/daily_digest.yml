name: Daily CD Paper Digest

on:
  schedule:
    # UTC 22:00 = JST 07:00（他の bot と時間をずらして負荷分散）
    # appendix: JST 08:00, UC: JST 07:30, CD: JST 07:00
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手動実行を許可

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
          PUBMED_EMAIL: ${{ secrets.PUBMED_EMAIL }}
        run: python src/main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_pmids.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update posted PMIDs [skip ci]"
            git push
          fi
